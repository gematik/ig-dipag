name: Generate images

on:
  push:
    branches:
    - '**'
    paths:
    - '**.drawio'
    - '**.puml'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: find
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Bei manuellem Trigger: alle image_src-Verzeichnisse
            changed_dirs=$(find . -type d -name "image_src" | sed 's|^\./||' | sort)
          else
            # Bei Push: nur image_src-Verzeichnisse mit geänderten Dateien
            changed_dirs=$(git diff --name-only HEAD~1 HEAD -- '*.puml' '*.drawio' \
              | xargs -I{} dirname {} \
              | sort -u \
              | grep 'image_src')
          fi

          entries=$(echo "$changed_dirs" | while read srcdir; do
            [ -z "$srcdir" ] && continue
            outdir=$(echo "$srcdir" | sed 's|image_src$|images|')
            echo "{\"srcdir\":\"$srcdir\",\"outdir\":\"$outdir\"}"
          done | jq -s -c '.')

          echo "matrix={\"include\":$entries}" >> "$GITHUB_OUTPUT"

  generate:
    needs: discover
    if: needs.discover.outputs.matrix != '{"include":[]}'
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    uses: gematik/github-image-actions/.github/workflows/generate-images.yml@0.2.0
    with:
      srcdir: ${{ matrix.srcdir }}
      outdir: ${{ matrix.outdir }}
      ref: 0.2.0
      png: true
      svg: false
